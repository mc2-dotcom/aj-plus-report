<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AJ+ : Qatar's Digital Influence Operation — Evidence Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap">

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --paper: #ffffff;
  --paper-2: #fafafa;
  --paper-3: #f4f4f5;
  --ink: #0a0a0a;
  --ink-dim: #262626;
  --ink-mid: #525252;
  --ink-faint: #737373;
  --ink-ghost: #a3a3a3;
  --rule: #e5e5e5;
  --rule-2: #d4d4d4;
  --rule-3: #a3a3a3;
  --red: #dc2626;
  --red-bright: #ef4444;
  --red-deep: #991b1b;
  --red-900: #7f1d1d;
  --red-wash: #fef2f2;
  --amber: #d97706;
  --amber-wash: #fffbeb;
  --ease: cubic-bezier(.2, .8, .2, 1);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.55;
  font-size: 16px;
}

a { color: var(--red); text-decoration: none; border-bottom: 1px solid rgba(220,38,38,.3); transition: border-color .2s var(--ease); }
a:hover { border-bottom-color: var(--red); }

.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; letter-spacing: .01em; }
.display { font-family: 'Archivo Narrow', 'Inter', sans-serif; font-weight: 700; letter-spacing: -.02em; text-transform: uppercase; }
.caps { text-transform: uppercase; letter-spacing: .18em; font-size: 11px; font-weight: 700; }

/* ============================================================
   LAYOUT
   ============================================================ */
.app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

/* ---- SIDEBAR ---- */
aside.nav {
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  padding: 32px 24px 32px;
  border-right: 1px solid var(--rule);
  background: var(--paper-2);
}
.brand { display: flex; flex-direction: column; gap: 4px; margin-bottom: 28px; }
.brand .kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
  color: var(--red); font-weight: 600;
}
.brand .title {
  font-family: 'Archivo Narrow', sans-serif;
  font-weight: 700; font-size: 26px; line-height: 1;
  color: var(--ink); letter-spacing: -.02em;
  text-transform: uppercase;
  margin-top: 2px;
}
.brand .sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  letter-spacing: .04em; margin-top: 8px; line-height: 1.55;
}

.classification {
  margin: 12px 0 24px;
  padding: 10px 12px;
  background: var(--ink);
  color: var(--paper);
  border-left: 3px solid var(--red);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .08em;
  line-height: 1.6;
}
.classification b { color: #f87171; font-weight: 600; }

nav.sections { display: flex; flex-direction: column; gap: 0; margin-top: 4px; }
nav.sections button {
  all: unset; cursor: pointer;
  padding: 10px 10px 10px 16px;
  display: flex; align-items: baseline; gap: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 13px; color: var(--ink-mid); font-weight: 500;
  border-left: 2px solid transparent;
  transition: all .15s var(--ease);
}
nav.sections button:hover { color: var(--ink); background: rgba(220,38,38,.04); border-left-color: var(--rule-3); }
nav.sections button.active {
  color: var(--ink); background: rgba(220,38,38,.06);
  border-left-color: var(--red); font-weight: 600;
}
nav.sections .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-ghost);
  min-width: 22px;
}
nav.sections button.active .num { color: var(--red); }

.animate-toggle {
  margin-top: 28px; padding-top: 20px;
  border-top: 1px solid var(--rule-2);
}
.animate-toggle .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--ink-mid);
  font-weight: 600;
  margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.toggle-switch {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: var(--paper);
  border: 1px solid var(--rule-2);
  cursor: pointer;
  transition: border-color .2s var(--ease);
}
.toggle-switch:hover { border-color: var(--ink-mid); }
.toggle-switch .sw {
  width: 32px; height: 18px; border-radius: 9px;
  background: var(--rule-2); position: relative;
  transition: background .2s var(--ease);
}
.toggle-switch .sw::after {
  content: ""; position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--paper); box-shadow: 0 1px 2px rgba(0,0,0,.15);
  transition: transform .2s var(--ease);
}
.toggle-switch.on .sw { background: var(--red); }
.toggle-switch.on .sw::after { transform: translateX(14px); }
.toggle-switch .t {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-dim); font-weight: 500;
}

.nav-foot {
  margin-top: 24px; padding-top: 16px;
  border-top: 1px solid var(--rule-2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  line-height: 1.7;
}
.nav-foot .live { color: var(--red); font-weight: 600; }
.nav-foot .live::before {
  content: "●"; margin-right: 4px;
  display: inline-block; animation: pulse 1.8s infinite var(--ease);
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
.anim-off .nav-foot .live::before { animation: none; }

/* ---- MAIN ---- */
main { padding: 56px 64px 160px; max-width: 1240px; }
section { margin-bottom: 120px; scroll-margin-top: 24px; }

/* section header */
.section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 32px; margin-bottom: 32px;
  padding-bottom: 18px; border-bottom: 2px solid var(--ink);
  position: relative;
}
.section-head::after {
  content: ""; position: absolute; bottom: -2px; left: 0;
  width: 80px; height: 2px; background: var(--red);
}
.section-head .h-left { display: flex; flex-direction: column; gap: 6px; }
.section-head .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--red);
  letter-spacing: .22em; text-transform: uppercase; font-weight: 600;
  display: flex; align-items: center; gap: 10px;
}
.section-head .tag::before {
  content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--red);
  box-shadow: 0 0 0 4px rgba(220,38,38,.12);
}
.section-head h2 {
  font-family: 'Archivo Narrow', sans-serif;
  font-weight: 700; font-size: 54px; line-height: .98;
  margin: 0; color: var(--ink); letter-spacing: -.02em;
  text-transform: uppercase;
}
.section-head .h-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-faint);
  text-align: right; letter-spacing: .04em; line-height: 1.65;
  max-width: 340px;
}

/* ============================================================
   HERO
   ============================================================ */
.hero {
  padding: 56px 64px 72px;
  margin: -56px -64px 64px;
  background: var(--paper);
  border-bottom: 2px solid var(--ink);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px;
  background: var(--red);
}
.hero .doc-meta {
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-faint);
  letter-spacing: .06em; margin-bottom: 36px;
  padding-bottom: 16px; border-bottom: 1px solid var(--rule);
}
.hero .doc-meta .left { display: flex; gap: 16px; align-items: center; }
.hero .doc-meta .left .red-stamp {
  background: var(--red); color: var(--paper);
  padding: 4px 10px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
}
.hero .kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--red);
  letter-spacing: .3em; text-transform: uppercase; font-weight: 600;
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 14px;
}
.hero .kicker::after { content: ""; flex: 0 0 80px; height: 2px; background: var(--red); }

.hero h1 {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 104px; font-weight: 700; line-height: 0.92;
  color: var(--ink); letter-spacing: -.03em;
  text-transform: uppercase;
  margin: 0 0 24px; max-width: 1100px;
}
.hero h1 em {
  font-style: normal; color: var(--red);
  background: linear-gradient(180deg, transparent 65%, rgba(220,38,38,.18) 65%);
  padding: 0 4px;
}

.hero .dek {
  font-family: 'Inter', sans-serif; font-weight: 400;
  font-size: 20px; line-height: 1.5; color: var(--ink-dim);
  max-width: 880px; margin-bottom: 32px;
}
.hero .dek b { color: var(--ink); font-weight: 600; }
.hero .byline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-faint);
  letter-spacing: .08em; line-height: 1.8;
  padding-top: 20px; border-top: 1px solid var(--rule);
}

.hero-strip {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 1px; margin-top: 40px; background: var(--rule);
  border: 1px solid var(--rule); padding: 1px;
}
.hero-strip .cell {
  background: var(--paper); padding: 20px 22px;
  display: flex; flex-direction: column; gap: 4px;
}
.hero-strip .cell .k {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  letter-spacing: .16em; text-transform: uppercase;
}
.hero-strip .cell .v {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 40px; font-weight: 700; color: var(--ink);
  letter-spacing: -.02em; line-height: 1.05;
}
.hero-strip .cell .v .u { color: var(--red); }
.hero-strip .cell .u-note {
  font-family: 'Inter', sans-serif; font-size: 11px;
  color: var(--ink-mid); margin-top: 2px; line-height: 1.4;
}

/* ============================================================
   DASHBOARD
   ============================================================ */
.metric-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.metric-tile {
  background: var(--paper); border: 1px solid var(--rule);
  padding: 22px 24px; display: flex; flex-direction: column;
  gap: 6px; position: relative;
  transition: border-color .2s var(--ease);
}
.metric-tile:hover { border-color: var(--ink); }
.metric-tile.alert { border-left: 3px solid var(--red); }
.metric-tile.black { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.metric-tile .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--ink-faint); font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.metric-tile.alert .tag { color: var(--red); }
.metric-tile.black .tag { color: var(--ink-ghost); }
.metric-tile .v {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 46px; font-weight: 700; line-height: 1;
  color: var(--ink); letter-spacing: -.02em;
  margin: 6px 0 2px;
}
.metric-tile.black .v { color: var(--paper); }
.metric-tile .v .unit { color: var(--red); }
.metric-tile .note {
  font-family: 'Inter', sans-serif; font-size: 12px;
  color: var(--ink-mid); line-height: 1.45;
}
.metric-tile.black .note { color: #a3a3a3; }
.metric-tile .ref {
  position: absolute; top: 14px; right: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; color: var(--ink-ghost);
  font-weight: 500;
}

/* ============================================================
   STRATEGIC FRAMEWORK
   ============================================================ */
.pullquote {
  margin: 40px 0;
  padding: 32px 36px 36px 48px;
  background: var(--ink); color: var(--paper);
  position: relative;
}
.pullquote::before {
  content: ""; position: absolute; top: 0; bottom: 0; left: 0;
  width: 4px; background: var(--red);
}
.pullquote .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--red-bright);
  letter-spacing: .22em; text-transform: uppercase; font-weight: 600;
  margin-bottom: 14px;
}
.pullquote .text {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 32px; font-weight: 500; line-height: 1.18;
  color: var(--paper); letter-spacing: -.01em;
  text-transform: uppercase;
}
.pullquote .text em { color: var(--red-bright); font-style: normal; }
.pullquote .cite {
  margin-top: 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #a3a3a3;
  letter-spacing: .06em; line-height: 1.65;
}

.prose p {
  font-family: 'Inter', sans-serif; font-size: 16px;
  line-height: 1.65; color: var(--ink-dim); margin: 0 0 18px;
  max-width: 820px;
}
.prose p b { color: var(--ink); font-weight: 600; }
.prose p.lede {
  font-size: 22px; font-weight: 400; color: var(--ink);
  line-height: 1.45; max-width: 880px;
  margin-bottom: 28px;
}
.prose p.lede b { color: var(--red); }

.hypocrisy {
  display: grid; grid-template-columns: 1fr 1fr;
  margin-top: 36px; border: 1px solid var(--ink);
}
.hypocrisy .col {
  padding: 28px 32px;
}
.hypocrisy .col.a {
  background: var(--paper-2);
  border-right: 1px solid var(--rule-2);
}
.hypocrisy .col.b {
  background: var(--ink); color: var(--paper);
}
.hypocrisy .col .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
  font-weight: 600; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.hypocrisy .col.a .label { color: var(--ink-mid); }
.hypocrisy .col.b .label { color: var(--red-bright); }
.hypocrisy .col h4 {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 24px; font-weight: 600; line-height: 1.15;
  color: var(--ink); margin: 0 0 16px;
  text-transform: uppercase; letter-spacing: -.01em;
}
.hypocrisy .col.b h4 { color: var(--paper); }
.hypocrisy .col ul {
  list-style: none; padding: 0; margin: 0;
  font-family: 'Inter', sans-serif; font-size: 13.5px;
  line-height: 1.65; color: var(--ink-dim);
}
.hypocrisy .col.b ul { color: #d4d4d4; }
.hypocrisy .col li {
  padding: 10px 0; border-bottom: 1px solid var(--rule);
  display: flex; gap: 10px; align-items: flex-start;
}
.hypocrisy .col.b li { border-bottom-color: #262626; }
.hypocrisy .col li:last-child { border-bottom: none; }
.hypocrisy .col li::before {
  content: ""; flex: 0 0 8px; height: 8px; margin-top: 7px;
  background: var(--rule-3);
}
.hypocrisy .col.b li::before { background: var(--red); }

.infra-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--rule); border: 1px solid var(--rule);
  margin-top: 32px;
}
.infra-grid .cell {
  background: var(--paper); padding: 20px 22px;
}
.infra-grid .cell .v {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 38px; font-weight: 700; line-height: 1;
  color: var(--ink); letter-spacing: -.02em;
}
.infra-grid .cell .v .u { color: var(--red); font-size: 28px; }
.infra-grid .cell .k {
  font-family: 'Inter', sans-serif; font-size: 12px;
  color: var(--ink-mid); margin-top: 6px; line-height: 1.45;
}

/* ============================================================
   CONTENT TAXONOMY
   ============================================================ */
.tax-filters {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 28px;
}
.tax-filters button {
  all: unset; cursor: pointer;
  padding: 9px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: .08em;
  color: var(--ink-mid); font-weight: 500;
  background: var(--paper-2); border: 1px solid var(--rule);
  transition: all .15s var(--ease);
}
.tax-filters button:hover { border-color: var(--ink-mid); color: var(--ink); }
.tax-filters button.active {
  background: var(--ink); color: var(--paper); border-color: var(--ink);
  font-weight: 600;
}
.tax-filters .count {
  margin-left: 6px; color: var(--ink-ghost); font-size: 10px;
}
.tax-filters button.active .count { color: #a3a3a3; }

.tax-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.tax-card {
  background: var(--paper); border: 1px solid var(--rule);
  padding: 22px 24px 20px;
  display: flex; flex-direction: column; gap: 8px;
  transition: all .25s var(--ease);
  opacity: 1; transform: translateY(0);
}
.tax-card.dim { opacity: .28; }
.tax-card .head {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 10px;
  padding-bottom: 12px; border-bottom: 1px solid var(--rule);
}
.tax-card .head .num {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 38px; font-weight: 700; color: var(--red);
  line-height: .9; letter-spacing: -.02em;
}
.tax-card .head .num-unit {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  letter-spacing: .14em; text-transform: uppercase;
  margin-top: 6px;
}
.tax-card h4 {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 22px; font-weight: 600; line-height: 1.1;
  color: var(--ink); margin: 0;
  text-transform: uppercase;
}
.tax-card .peak {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: var(--ink-dim); line-height: 1.5;
  padding-top: 10px;
}
.tax-card .peak b { color: var(--ink); }
.tax-card .peak .eng {
  display: inline-flex; gap: 6px; margin-top: 6px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--red); font-weight: 600;
}
.tax-card .plat {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px dashed var(--rule-2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  letter-spacing: .08em; text-transform: uppercase;
  display: flex; justify-content: space-between;
}
.tax-card .plat b { color: var(--ink-dim); }

/* ============================================================
   COORDINATION — 7-second sync hero
   ============================================================ */
.sync-hero {
  background: var(--ink); color: var(--paper);
  padding: 36px 40px 40px; margin-top: 24px;
  position: relative; overflow: hidden;
}
.sync-hero::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--red);
}
.sync-hero .hdr {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 28px; gap: 32px;
}
.sync-hero .hdr h3 {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 32px; font-weight: 700; line-height: 1.05;
  margin: 0 0 8px; text-transform: uppercase;
  letter-spacing: -.01em; color: var(--paper);
  max-width: 600px;
}
.sync-hero .hdr h3 .red { color: var(--red-bright); }
.sync-hero .hdr .sub {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: #a3a3a3; line-height: 1.55;
  max-width: 560px;
}
.sync-hero .controls {
  display: flex; flex-direction: column; gap: 10px;
  align-items: flex-end; flex-shrink: 0;
}
.sync-hero .play-btn {
  all: unset; cursor: pointer;
  background: var(--red); color: var(--paper);
  padding: 10px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  transition: background .15s var(--ease);
  display: inline-flex; align-items: center; gap: 10px;
}
.sync-hero .play-btn:hover { background: var(--red-bright); }
.sync-hero .play-btn:disabled { opacity: .4; cursor: not-allowed; }
.sync-hero .counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-ghost);
  letter-spacing: .12em;
}
.sync-hero .counter b { color: var(--red-bright); font-weight: 600; }

.track-wrap {
  display: flex; flex-direction: column; gap: 16px;
  padding: 24px 0 0;
}
.track-row {
  display: grid; grid-template-columns: 130px 1fr 180px;
  gap: 20px; align-items: center;
}
.track-row .plat-label {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 28px; font-weight: 700;
  text-transform: uppercase; letter-spacing: -.01em;
  color: #525252;
  transition: color .3s var(--ease);
}
.track-row.active .plat-label { color: var(--red-bright); }
.track-row .track {
  height: 52px; position: relative;
  background: #1a1a1a; border: 1px solid #2a2a2a;
}
.track-row .track-grid {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    90deg, transparent 0, transparent calc(10% - 1px),
    rgba(255,255,255,.05) calc(10% - 1px), rgba(255,255,255,.05) 10%
  );
}
.track-row .pulse {
  position: absolute; top: 50%; transform: translate(-50%, -50%) scale(0);
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--red); opacity: 0;
  box-shadow: 0 0 20px rgba(220,38,38,.6);
  transition: transform .3s var(--ease), opacity .3s var(--ease);
}
.track-row .pulse.on {
  transform: translate(-50%, -50%) scale(1); opacity: 1;
}
.track-row .pulse .ring {
  position: absolute; inset: -8px; border-radius: 50%;
  border: 2px solid var(--red-bright); opacity: 0;
  animation: sonarRing 1.8s infinite var(--ease);
}
.track-row .pulse.on .ring { opacity: 1; }
@keyframes sonarRing {
  0% { transform: scale(.6); opacity: .8; }
  100% { transform: scale(3.2); opacity: 0; }
}
.track-row .ts {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: #737373;
  text-align: left; line-height: 1.5;
  transition: color .3s var(--ease);
}
.track-row.active .ts { color: var(--paper); }
.track-row .ts b { color: var(--red-bright); font-size: 14px; }

.delta-row {
  margin-top: 20px;
  padding: 16px 20px;
  background: #1a1a1a; border: 1px solid #2a2a2a;
  border-left: 3px solid var(--red);
  display: flex; justify-content: space-between; align-items: center;
}
.delta-row .l {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 22px; font-weight: 700; color: var(--paper);
  text-transform: uppercase; letter-spacing: -.01em;
}
.delta-row .l b { color: var(--red-bright); }
.delta-row .r {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #a3a3a3; letter-spacing: .08em;
}

/* ============================================================
   COORDINATION — Narrative Rollout (AJE → AJ+)
   ============================================================ */
.rollout-log {
  padding: 28px 0 8px;
  display: flex; flex-direction: column;
}
.roll-entry {
  display: grid;
  grid-template-columns: 150px 1fr;
  gap: 22px;
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity .5s var(--ease), transform .5s var(--ease);
}
.roll-entry.on { opacity: 1; transform: translateX(0); }
.roll-entry .left {
  text-align: right; padding-top: 12px;
}
.roll-entry .left .acct {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 22px; font-weight: 700;
  color: var(--red-bright);
  text-transform: uppercase; letter-spacing: -.01em;
  line-height: 1;
}
.roll-entry .left .time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: #a3a3a3;
  letter-spacing: .08em;
  margin-top: 4px;
}
.roll-entry .card {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-left: 3px solid var(--red);
  padding: 16px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  color: #e5e5e5;
  line-height: 1.55;
}
.roll-entry .card .hl {
  color: var(--red-bright);
  font-weight: 600;
  background: rgba(220,38,38,.14);
  padding: 1px 4px;
  border-radius: 1px;
}
.roll-gap {
  display: grid;
  grid-template-columns: 150px 1fr;
  gap: 22px;
  padding: 6px 0;
  opacity: 0;
  transition: opacity .4s var(--ease);
}
.roll-gap.on { opacity: 1; }
.roll-gap .l-empty {}
.roll-gap .r {
  display: flex; align-items: center; gap: 14px;
  padding-left: 20px;
}
.roll-gap .dots-v {
  width: 2px; height: 24px;
  background: repeating-linear-gradient(
    180deg, #3a3a3a 0, #3a3a3a 3px, transparent 3px, transparent 7px
  );
}
.roll-gap.emph .dots-v {
  background: repeating-linear-gradient(
    180deg, var(--red) 0, var(--red) 3px, transparent 3px, transparent 7px
  );
}
.roll-gap .lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #a3a3a3;
  letter-spacing: .12em; text-transform: uppercase;
}
.roll-gap.emph .lbl { color: var(--red-bright); font-weight: 600; }
.roll-gap .lbl b { color: var(--paper); font-weight: 700; }

.overlap-card {
  margin-top: 24px;
  padding: 20px 22px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-left: 2px solid var(--amber);
}
.overlap-card .hdr {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--amber);
  letter-spacing: .16em;
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 14px;
}
.overlap-card .hdr b { color: var(--paper); }
.overlap-card .terms {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.overlap-card .term {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 20px; font-weight: 600;
  color: var(--paper);
  padding: 6px 14px;
  background: rgba(220,38,38,.14);
  border-left: 2px solid var(--red);
  text-transform: uppercase;
  letter-spacing: -.005em;
}
.overlap-card .foot {
  margin-top: 14px;
  font-family: 'Inter', sans-serif;
  font-size: 13.5px;
  color: #a3a3a3;
  line-height: 1.55;
  max-width: 780px;
}
.overlap-card .foot b { color: var(--paper); }

/* ============================================================
   COORDINATION — 21x Fanon timeline
   ============================================================ */
.fanon-block {
  margin-top: 28px; padding: 32px 36px 36px;
  background: var(--paper-2); border: 1px solid var(--rule);
  position: relative;
}
.fanon-block::before {
  content: ""; position: absolute; top: 0; left: 0;
  width: 80px; height: 2px; background: var(--red);
}
.fanon-block .hdr {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 22px; gap: 24px;
}
.fanon-block .hdr h3 {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 32px; font-weight: 700; line-height: 1.05;
  margin: 0 0 6px;
  text-transform: uppercase; letter-spacing: -.01em;
  color: var(--ink); max-width: 600px;
}
.fanon-block .hdr h3 em {
  font-style: normal; color: var(--red);
}
.fanon-block .hdr .sub {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: var(--ink-mid); max-width: 540px; line-height: 1.55;
}
.fanon-block .hdr .ctrl {
  display: flex; gap: 10px; align-items: center; flex-shrink: 0;
}
.fanon-block .hdr .ctrl .cnt {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 38px; font-weight: 700; color: var(--red);
  line-height: 1;
}
.fanon-block .hdr .ctrl .cnt-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  letter-spacing: .14em; text-transform: uppercase;
  margin-left: 6px;
}
.fanon-block .hdr .play-btn {
  all: unset; cursor: pointer;
  background: var(--ink); color: var(--paper);
  padding: 9px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  transition: background .15s var(--ease);
}
.fanon-block .hdr .play-btn:hover { background: var(--red); }

.fanon-axis {
  position: relative; height: 120px;
  padding-top: 16px;
}
.fanon-axis .baseline {
  position: absolute; left: 0; right: 0; top: 62px;
  height: 1px; background: var(--rule-2);
}
.fanon-axis .tick {
  position: absolute; top: 28px;
  width: 3px; height: 44px;
  background: var(--red);
  transform-origin: bottom center;
  transform: scaleY(0);
  transition: transform .35s var(--ease);
}
.fanon-axis .tick.drawn { transform: scaleY(1); }
.fanon-axis .tick::after {
  content: ""; position: absolute; bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 10px rgba(220,38,38,.5);
}
.fanon-axis .dates {
  position: absolute; left: 0; right: 0; top: 92px;
  display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  letter-spacing: .08em; text-transform: uppercase;
}
.fanon-axis .dates .mid {
  position: absolute; left: 50%; transform: translateX(-50%);
}

/* ============================================================
   COORDINATION — recycling table
   ============================================================ */
.recycle-table {
  margin-top: 28px;
  border: 1px solid var(--rule);
  background: var(--paper);
}
.recycle-table .title {
  padding: 16px 24px;
  border-bottom: 1px solid var(--rule);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--paper-2);
}
.recycle-table .title .l {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 18px; font-weight: 600; text-transform: uppercase;
  color: var(--ink);
}
.recycle-table .title .r {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--ink-faint);
  letter-spacing: .12em; text-transform: uppercase;
}
.recycle-row {
  display: grid; grid-template-columns: 2.4fr .7fr 1.2fr 1fr;
  padding: 14px 24px; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--rule);
  font-size: 13px;
}
.recycle-row:last-child { border-bottom: none; }
.recycle-row:nth-child(even) { background: var(--paper-2); }
.recycle-row .topic { color: var(--ink); font-weight: 500; }
.recycle-row .reposts {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 28px; font-weight: 700; color: var(--red);
  line-height: 1;
}
.recycle-row .reposts .x {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; color: var(--ink-faint); font-weight: 400;
}
.recycle-row .period {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-mid);
}
.recycle-row .period b { color: var(--ink); }
.recycle-row .views {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--ink-dim); text-align: right;
}

/* ============================================================
   COORDINATION — Amplifier network (pairwise similarity analysis)
   ============================================================ */
.amp-block {
  margin-top: 40px;
  padding: 32px 36px 36px;
  background: var(--ink);
  color: var(--paper);
  position: relative;
  overflow: hidden;
}
.amp-block::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--red);
}
.amp-block .hdr {
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: 32px; margin-bottom: 10px;
}
.amp-block .hdr h3 {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 32px; font-weight: 700; line-height: 1.05;
  text-transform: uppercase; letter-spacing: -.01em;
  color: var(--paper);
  margin: 0 0 8px; max-width: 660px;
}
.amp-block .hdr h3 .red { color: var(--red-bright); }
.amp-block .hdr .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: #a3a3a3;
  letter-spacing: .12em; text-transform: uppercase;
  text-align: right;
  line-height: 1.7;
}
.amp-block .hdr .meta b { color: var(--red-bright); font-weight: 600; }
.amp-block .dek {
  font-family: 'Inter', sans-serif; font-size: 14.5px;
  color: #d4d4d4; line-height: 1.6;
  max-width: 880px; margin-bottom: 26px;
}
.amp-block .dek b { color: var(--paper); font-weight: 600; }
.amp-block .dek em { font-style: normal; color: var(--red-bright); }

.amp-table {
  background: #0a0a0a; border: 1px solid #2a2a2a;
  margin-top: 8px;
}
.amp-table .thead {
  display: grid; grid-template-columns: 1.4fr 1.2fr .7fr .7fr .7fr .7fr .8fr;
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .14em;
  color: #737373; text-transform: uppercase; font-weight: 600;
  background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
  gap: 10px;
}
.amp-row {
  display: grid; grid-template-columns: 1.4fr 1.2fr .7fr .7fr .7fr .7fr .8fr;
  padding: 14px 16px;
  border-bottom: 1px solid #262626;
  align-items: center;
  gap: 10px;
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: #d4d4d4;
  transition: background .15s var(--ease);
}
.amp-row:last-child { border-bottom: none; }
.amp-row:hover { background: #111; }
.amp-row .handle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px; color: var(--paper); font-weight: 600;
}
.amp-row .role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: .08em;
  text-transform: uppercase; font-weight: 600;
  padding: 3px 8px; border-radius: 2px;
  display: inline-block; white-space: nowrap;
}
.amp-row .role.sibling { background: rgba(220,38,38,.18); color: var(--red-bright); }
.amp-row .role.copy    { background: rgba(245,158,11,.15); color: #f59e0b; }
.amp-row .role.seeder  { background: rgba(59,130,246,.15); color: #93c5fd; }
.amp-row .role.peer    { background: rgba(163,163,163,.15); color: #d4d4d4; }
.amp-row .role.arab    { background: rgba(163,163,163,.15); color: #a3a3a3; }
.amp-row .num {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 24px; font-weight: 700; color: var(--paper);
  line-height: 1;
}
.amp-row .num.red { color: var(--red-bright); }
.amp-row .pct-bar {
  height: 6px; background: #262626; position: relative;
  width: 100%;
}
.amp-row .pct-bar span {
  position: absolute; top: 0; left: 0; height: 100%;
  background: var(--red); box-shadow: 0 0 6px rgba(220,38,38,.4);
}
.amp-row .sim-wrap { display: flex; flex-direction: column; gap: 4px; }
.amp-row .sim-val {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--paper); font-weight: 500;
}
.amp-row .delta {
  font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  color: #d4d4d4;
}
.amp-row .delta.neg { color: #93c5fd; }
.amp-row .delta.neg::before { content: "← "; }

/* Specimen cards */
.specimens {
  margin-top: 28px;
  display: flex; flex-direction: column; gap: 14px;
}
.specimen {
  background: #0a0a0a; border: 1px solid #2a2a2a;
  padding: 20px 22px;
}
.specimen .sp-hdr {
  display: flex; justify-content: space-between; align-items: flex-start;
  flex-wrap: wrap; gap: 12px;
  padding-bottom: 14px; margin-bottom: 14px;
  border-bottom: 1px dashed #2a2a2a;
}
.specimen .sp-hdr .l {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: #737373;
  letter-spacing: .14em; text-transform: uppercase;
  font-weight: 600;
}
.specimen .sp-hdr .l b { color: var(--paper); font-weight: 700; }
.specimen .sp-hdr .r {
  display: flex; gap: 14px; align-items: baseline;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: #a3a3a3;
  letter-spacing: .08em; text-transform: uppercase;
}
.specimen .sp-hdr .r .sim-score {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 22px; font-weight: 700;
  color: #f59e0b;
  letter-spacing: -.02em;
}
.specimen .sp-hdr .r .sim-score.extreme { color: var(--red-bright); }
.specimen .sp-grid {

}
.specimen .sp-col {
  padding: 14px 16px;

  border: 1px solid #262626;

}

.specimen .sp-col.echo { border-left: 3px solid #f59e0b; }
.specimen .sp-col .h {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: #a3a3a3;
  letter-spacing: .14em; text-transform: uppercase;
  font-weight: 600; margin-bottom: 8px;
  display: flex; justify-content: space-between;
}
.specimen .sp-col.ajp .h { color: var(--red-bright); }
.specimen .sp-col.echo .h { color: #f59e0b; }
.specimen .sp-col .q {
  font-family: 'Inter', sans-serif;
  font-size: 13.5px; line-height: 1.55;
  color: var(--paper);
}
.specimen .sp-col .q .hl {
  background: rgba(245,158,11,.18);
  color: #f59e0b; padding: 0 3px;
  font-weight: 500;
}
.specimen .sp-connector {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; color: #737373;
  letter-spacing: .1em; text-transform: uppercase;
}
.specimen .sp-connector .arrow {
  font-size: 16px; color: var(--red);
  line-height: 1;
}
.specimen .sp-foot {
  margin-top: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #a3a3a3;
  letter-spacing: .04em;
  line-height: 1.6;
}
.specimen .sp-foot b { color: var(--red-bright); font-weight: 600; }

.meth-note {
  margin-top: 24px; padding: 14px 18px;
  background: #0a0a0a; border: 1px solid #262626;
  border-left: 2px solid #525252;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px; line-height: 1.7;
  color: #a3a3a3;
}
.meth-note b { color: var(--paper); font-weight: 600; }

/* ============================================================
   COORDINATION — Head-to-head (@ajplus vs @dropsitenews)
   ============================================================ */
.hth-header { margin-bottom: 20px; }
.hth-header .hdr-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase;
  color: #a3a3a3; font-weight: 600; margin-bottom: 14px;
}
.hth-header h3 {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 40px; font-weight: 700; line-height: 1;
  text-transform: uppercase; letter-spacing: -.02em;
  color: var(--paper); margin: 0 0 14px;
}
.hth-header h3 .red { color: var(--red-bright); }
.hth-dek {
  font-family: 'Inter', sans-serif; font-size: 15px;
  line-height: 1.6; color: #d4d4d4; max-width: 960px;
}
.hth-dek b { color: var(--paper); font-weight: 600; }

.hth-identity {
  display: grid;
  grid-template-columns: 1fr 60px 1fr;
  gap: 0; margin: 28px 0;
  align-items: stretch;
}
.id-card {
  background: #0a0a0a;
  border: 1px solid #2a2a2a;
  padding: 22px 24px;
  display: flex; flex-direction: column; gap: 16px;
}
.id-card.ajp { border-left: 3px solid var(--red); }
.id-card.ds { border-left: 3px solid #93c5fd; }
.id-card .id-head { padding-bottom: 14px; border-bottom: 1px dashed #2a2a2a; }
.id-card .id-handle {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 30px; font-weight: 700;
  text-transform: uppercase; letter-spacing: -.02em;
  line-height: 1;
}
.id-card.ajp .id-handle { color: var(--red-bright); }
.id-card.ds .id-handle { color: #93c5fd; }
.id-card .id-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #d4d4d4;
  letter-spacing: .12em; text-transform: uppercase;
  margin-top: 8px; font-weight: 600;
}
.id-card .id-subtle {
  font-family: 'Inter', sans-serif;
  font-size: 12.5px; color: #a3a3a3;
  margin-top: 4px; line-height: 1.45;
}
.id-card .id-stats { display: flex; flex-direction: column; gap: 8px; }
.id-card .id-stat {
  display: grid; grid-template-columns: 130px 1fr;
  gap: 12px; align-items: baseline; padding: 3px 0;
  border-bottom: 1px dotted #222;
}
.id-card .id-stat:last-child { border-bottom: none; }
.id-card .id-stat .k {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: #737373;
  letter-spacing: .1em; text-transform: uppercase;
}
.id-card .id-stat .v {
  font-family: 'Inter', sans-serif;
  font-size: 13px; color: var(--paper); font-weight: 500;
}

.vs-sep {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; padding: 0;
}
.vs-sep .vs-line { flex: 1; width: 1px; background: #2a2a2a; }
.vs-sep .vs-badge {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 18px; font-weight: 700;
  color: #525252; padding: 10px 0; letter-spacing: .02em;
}

.hth-metrics {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: #2a2a2a;
  border: 1px solid #2a2a2a; margin: 22px 0;
}
.hth-metrics .m {

.hth-metrics .m .v {

.hth-flow {

.flow-row .flow-to {

.flow-row .flow-count {

.hth-others {

/* ============================================================
   COORDINATION — Network graph
   ============================================================ */
.netmap {
  background: var(--ink);
  color: var(--paper);
  padding: 32px 36px 36px;
  margin-top: 24px;
  position: relative;
  overflow: hidden;
}
.netmap::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--red);
}
.netmap-header { margin-bottom: 22px; }
.netmap-header .hdr-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase;
  color: #a3a3a3; font-weight: 600; margin-bottom: 14px;
}
.netmap-header h3 {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 36px; font-weight: 700; line-height: 1;
  text-transform: uppercase; letter-spacing: -.02em;
  color: var(--paper); margin: 0 0 14px;
}
.netmap-header h3 .red { color: var(--red-bright); }
.netmap-header .dek {
  font-family: 'Inter', sans-serif; font-size: 14.5px;
  line-height: 1.6; color: #d4d4d4; max-width: 900px;
}
.netmap-header .dek b { color: var(--paper); }

.netmap-body {
  display: grid; grid-template-columns: 1.4fr 1fr;
  gap: 20px; align-items: stretch;
}

.netmap-canvas {
  background: #0a0a0a;
  border: 1px solid #2a2a2a;
  padding: 16px;
  min-height: 520px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.netmap-canvas svg {
  width: 100%; height: auto;
  display: block;
}
.netmap-canvas .canvas-label {
  position: absolute; top: 16px; left: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .16em;
  color: #737373; text-transform: uppercase;
  z-index: 2;
}
.netmap-canvas .canvas-legend {
  position: absolute; bottom: 16px; left: 20px;
  display: flex; gap: 16px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: #a3a3a3;
  letter-spacing: .08em; text-transform: uppercase;
  z-index: 2;
}
.netmap-canvas .canvas-legend .item { display: flex; gap: 6px; align-items: center; }
.netmap-canvas .canvas-legend .sw {
  width: 14px; height: 2px;
}
.netmap-canvas .canvas-legend .sw.primary { background: #f59e0b; height: 3px; }
.netmap-canvas .canvas-legend .sw.secondary { background: #525252; border-top: 1px dashed #737373; }
.netmap-canvas .canvas-legend .sw.copy { background: var(--red); height: 3px; }

/* SVG node styles */
.net-edge {
  transition: opacity .3s var(--ease);
}
.net-edge.primary { stroke: #f59e0b; opacity: .65; }
.net-edge.primary.active { opacity: 1; }
.net-edge.primary.copy { stroke: var(--red); }
.net-edge.secondary {
  stroke: #525252; stroke-dasharray: 4 4; stroke-width: 1;
  opacity: .5;
}
.net-edge.secondary.active { stroke: #93c5fd; opacity: .9; }

.net-node-g { cursor: pointer; transition: all .25s var(--ease); }
.net-node-circle {
  transition: all .3s var(--ease);
}
.net-node-g.hub .net-node-circle {
  fill: var(--red);
  stroke: rgba(220,38,38,.3);
  stroke-width: 12;
}
.net-node-g.peer .net-node-circle {
  fill: #2563eb;
  stroke: rgba(37,99,235,.3);
  stroke-width: 6;
}
.net-node-g.copy .net-node-circle {
  fill: #d97706;
  stroke: rgba(217,119,6,.3);
  stroke-width: 6;
}
.net-node-g.selected .net-node-circle {
  stroke: #fff;
  stroke-width: 3;
  filter: drop-shadow(0 0 8px rgba(255,255,255,.4));
}
.net-node-g:hover .net-node-circle {
  stroke: rgba(255,255,255,.6);
  stroke-width: 2.5;
}
.net-node-label {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 15px; font-weight: 700;
  fill: var(--paper);
  text-anchor: middle;
  letter-spacing: -.01em;
  pointer-events: none;
}
.net-node-g.hub .net-node-label { font-size: 17px; fill: var(--red-bright); }
.net-node-sublabel {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  fill: #a3a3a3;
  text-anchor: middle;
  letter-spacing: .08em;
  text-transform: uppercase;
  pointer-events: none;
}
.net-edge-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  fill: #f59e0b;
  text-anchor: middle;
  letter-spacing: .06em;
  font-weight: 600;
  pointer-events: none;
}

/* Detail panel */
.netmap-detail {
  background: #0a0a0a; border: 1px solid #2a2a2a;
  padding: 22px 24px; display: flex; flex-direction: column;
}
.netmap-detail .d-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: #737373;
  letter-spacing: .18em; text-transform: uppercase;
  font-weight: 600; margin-bottom: 10px;
  display: flex; justify-content: space-between;
}
.netmap-detail .d-tag .hint { color: #525252; }
.netmap-detail .d-head {
  padding-bottom: 14px; margin-bottom: 16px;
  border-bottom: 1px solid #2a2a2a;
}
.netmap-detail .d-handle {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 30px; font-weight: 700;
  color: var(--paper); line-height: 1;
  text-transform: uppercase; letter-spacing: -.02em;
}
.netmap-detail.peer .d-handle { color: #60a5fa; }
.netmap-detail.copy .d-handle { color: #f59e0b; }
.netmap-detail.hub .d-handle { color: var(--red-bright); }
.netmap-detail .d-framing {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: #a3a3a3;
  letter-spacing: .1em; text-transform: uppercase;
  margin-top: 6px; font-weight: 500;
}
.netmap-detail .d-desc {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: #d4d4d4; line-height: 1.55; margin-top: 10px;
}

.bar-stack {
  display: flex; flex-direction: column; gap: 16px;
  margin-bottom: 16px;
}
.bar-item { display: flex; flex-direction: column; gap: 6px; }
.bar-top {
  display: flex; justify-content: space-between; align-items: baseline;
}
.bar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #a3a3a3;
  letter-spacing: .08em; text-transform: uppercase;
  font-weight: 500;
}
.bar-value {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 28px; font-weight: 700;
  color: var(--paper); line-height: 1; letter-spacing: -.02em;
  font-variant-numeric: tabular-nums;
}
.bar-value.red { color: var(--red-bright); }
.bar-value.amber { color: #f59e0b; }
.bar-value.blue { color: #60a5fa; }
.bar-value .unit {
  font-size: 14px; color: #737373; margin-left: 2px;
}
.bar-track {
  height: 10px; background: #1a1a1a;
  border: 1px solid #262626;
  position: relative; overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--red) 0%, var(--red-bright) 100%);
  transition: width 900ms cubic-bezier(.2, .8, .2, 1);
}
.bar-fill.amber {
  background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
}
.bar-fill.blue {
  background: linear-gradient(90deg, #2563eb 0%, #60a5fa 100%);
}
.app.anim-off .bar-fill { transition: none; }

.d-footer {
  margin-top: auto; padding-top: 14px;
  border-top: 1px dashed #2a2a2a;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: #737373;
  letter-spacing: .06em; line-height: 1.7;
}
.d-footer b { color: var(--paper); font-weight: 600; }
.d-footer .click-hint {
  color: var(--red-bright); font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
}
.d-footer .click-hint::before { content: "▸"; }

.netmap-footnote {
  margin-top: 18px; padding: 14px 18px;
  background: #0a0a0a; border-left: 2px solid #525252;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #a3a3a3;
  line-height: 1.65; letter-spacing: .04em;
}
.netmap-footnote b { color: var(--paper); }

@media (max-width: 900px) {
  .netmap-body { grid-template-columns: 1fr; }
  .netmap-canvas { min-height: 440px; }
}

/* ============================================================
   AMPLIFICATION — bot network
   ============================================================ */
.bot-hero {

.bot-hero .hdr h3 {

  font-size: 32px; font-weight: 700; line-height: 1.05;

}
.bot-hero .hdr h3 .red { color: var(--red-bright); }
.bot-hero .hdr .sub {

.bot-tabs {

.bot-grid-layout {

}
.bot-summary {

}
.bot-summary .big-num {

.bot-summary .big-num .u {
  color: #d4d4d4; font-size: 64px; margin-left: 2px;
}
.bot-summary .big-lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #a3a3a3;
  letter-spacing: .14em; text-transform: uppercase;
  margin-top: 10px; font-weight: 600;
}
.bot-summary .big-desc {
  font-family: 'Inter', sans-serif;
  font-size: 14px; color: #d4d4d4;

.bot-viz {
  background: #0a0a0a; border: 1px solid #2a2a2a;
  padding: 22px;
}
.bot-viz .lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .14em;
  color: #737373; text-transform: uppercase;
  margin-bottom: 14px;
  display: flex; justify-content: space-between;
}
.bot-viz .lbl .amber { color: var(--red-bright); font-weight: 600; }

.dot-grid .dot {

.dot-grid .dot.real { background: #737373; }

.bot-viz .legend {

  font-size: 10px; color: #a3a3a3; letter-spacing: .08em;

.bot-viz .legend .k { display: flex; align-items: center; gap: 8px; }
.bot-viz .legend .sw { width: 10px; height: 10px; }
.bot-viz .legend .sw.real { background: #737373; }
.bot-viz .legend .sw.fake { background: var(--red); }

.bot-hero .footer-row {
  margin-top: 26px; padding-top: 16px;

  display: flex; justify-content: space-between;

  font-size: 10px; color: #737373; letter-spacing: .1em;
  text-transform: uppercase;
}

.caveat {

}
.caveat .hdr {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  color: var(--amber); letter-spacing: .14em;

.caveat .body {
  font-family: 'Inter', sans-serif; font-size: 14px;

}
.caveat .body b { color: #451a03; }

/* ============================================================
   KEY ACTORS
   ============================================================ */
.actor-grid {

.actor-card {

.actor-card:hover { border-color: var(--ink); }
.actor-card .hdr {

}
.actor-card .hdr .l h4 {
  font-family: 'Archivo Narrow', sans-serif;
  font-size: 26px; font-weight: 700;
  color: var(--ink); margin: 0 0 4px;
  text-transform: uppercase; letter-spacing: -.01em;
}
.actor-card .hdr .l .role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--red);
  letter-spacing: .08em; font-weight: 600;

.actor-card .hdr .r {

.actor-card .hdr .r .v {

.actor-card .hdr .r .k {

}
.actor-card .stats .stat b {

.actor-card .quote {
  font-family: 'Inter', sans-serif;

/* ============================================================
   FARA TIMELINE
   ============================================================ */
.fara-wrap {
  position: relative; padding: 40px 20px 20px;
}
.fara-wrap .baseline {
  position: absolute; left: 40px; right: 40px; top: 84px;
  height: 2px; background: var(--ink);
}
.fara-timeline {
  display: grid; grid-template-columns: repeat(8, 1fr);
  gap: 12px;
  position: relative;
}
.fara-event {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  position: relative; padding-top: 30px;
}
.fara-event .node {
  position: absolute; top: 24px; left: 50%;
  transform: translateX(-50%) scale(0);
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--paper);
  border: 2px solid var(--ink);
  z-index: 2;
  transition: transform .4s var(--ease);
}
.fara-event.drawn .node { transform: translateX(-50%) scale(1); }

function useReveal() {
  // IntersectionObserver-driven reveal
  const ref = useRef(null);
  const [revealed, setRevealed] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { setRevealed(true); obs.disconnect(); }
      });
    }, { rootMargin: "0px 0px -80px 0px", threshold: .1 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, revealed];
}

function useActiveSection() {
  const [active, setActive] = useState("hero");
  useEffect(() => {
    const els = SECTIONS.map(s => document.getElementById(s.id)).filter(Boolean);
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) setActive(e.target.id);
      });
    }, { rootMargin: "-30% 0px -60% 0px" });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
  return active;
}

function App() {
  const [animate, setAnimate] = useState(true);
  const [isPrinting, setIsPrinting] = useState(false);
  const active = useActiveSection();

  // Respect prefers-reduced-motion on load
  useEffect(() => {
    const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
    if (mq.matches) setAnimate(false);
  }, []);

  // Disable animations while printing so bars capture at final values
  useEffect(() => {
    const before = () => setIsPrinting(true);
    const after = () => setIsPrinting(false);
    window.addEventListener("beforeprint", before);
    window.addEventListener("afterprint", after);
    return () => {
      window.removeEventListener("beforeprint", before);
      window.removeEventListener("afterprint", after);
    };
  }, []);

  const effAnimate = animate && !isPrinting;

  return (
    <div className={`app ${effAnimate ? "anim-on" : "anim-off"}`}>
      <Sidebar active={active} animate={animate} setAnimate={setAnimate} />
      <main>
        <Hero />

        <Amplification animate={effAnimate} />

  );
}

function AnimatedBar({ label, value, max, color, decimals = 0, unit = "", animate, animTick }) {
  const [display, setDisplay] = useState(0);
  const [pct, setPct] = useState(0);

  useEffect(() => {
    if (!animate) {
      setDisplay(value);
      setPct(Math.min(100, (value / max) * 100));
      return;
    }
    setDisplay(0);
    setPct(0);
    const start = Date.now();
    const dur = 900;
    let raf;
    const tick = () => {
      const t = Math.min(1, (Date.now() - start) / dur);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(value * eased);
      setPct(Math.min(100, (value / max) * 100 * eased));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    // tiny delay so React can render the "0" state before starting the animation
    const startTimer = setTimeout(() => { raf = requestAnimationFrame(tick); }, 60);
    return () => { clearTimeout(startTimer); if (raf) cancelAnimationFrame(raf); };
  }, [animTick, value, max, animate]);

  const fmt = (v) => {
    if (decimals === 0) return Math.round(v).toLocaleString();
    return v.toFixed(decimals);
  };

  return (
    <div className="bar-item">
      <div className="bar-top">
        <span className="bar-label">{label}</span>
        <span className={`bar-value ${color || ""}`}>{fmt(display)}{unit && <span className="unit">{unit}</span>}</span>
      </div>
      <div className="bar-track">
        <div className={`bar-fill ${color || ""}`} style={{ width: `${pct}%` }}></div>
      </div>
    </div>
  );
}

function NetworkMap({ animate }) {
  const [selected, setSelected] = useState("dropsitenews");

  const isEdgeActive = (e) => e.from === selected || e.to === selected;

    if (primary) return 1.5 + Math.sqrt(matches) * 0.9;
    return 0.8 + Math.sqrt(matches) * 0.4;
  };

  // Label position (midpoint of edge, slightly offset)
  const labelPos = (e) => {
    const a = getNode(e.from);
    const b = getNode(e.to);
    return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 - 4 };

  return (
    <div className="netmap">

            <circle cx="390" cy="260" r="120" fill="none" stroke="#1a1a1a" strokeWidth="1" strokeDasharray="2 6" />

            {/* Secondary (peer-to-peer) edges first so they sit behind primary */}
            {NETWORK_EDGES.filter(e => !e.primary).map((e, i) => {
              const a = getNode(e.from); const b = getNode(e.to);
              const active = isEdgeActive(e);
              return (
                <line key={`s${i}`}
                  x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                  className={`net-edge secondary ${active ? "active" : ""}`}
                  strokeWidth={edgeWidth(e.matches, false)}
                />
              );
            })}

            {/* Primary edges */}
            {NETWORK_EDGES.filter(e => e.primary).map((e, i) => {

                    strokeWidth={edgeWidth(e.matches, true)}

                  {active && (() => {
                    const p = labelPos(e);
                    return <text x={p.x} y={p.y} className="net-edge-label">{e.label}</text>;
                  })()}
                </g>
              );

            {/* Nodes */}

              const cls = `net-node-g ${n.type} ${isSel ? "selected" : ""}`;

          <div className="canvas-legend">

      </div>
    </div>
  );
}

                <div>hrs later</div>
              </div>
              <div className="sp-col ajp">
                <div className="h"><span>@ajplus · {s.aj_ts}</span><span>ECHOES</span></div>
                <div className="q">{highlight(s.aj_text, s.hl)}</div>
              </div>
            </div>
            <div className="sp-foot">▸ <b>{s.note}</b></div>
          </div>
        ))}
      </div>

      <div className="hth-others">
        <div className="hdr">The pattern is not unique to @dropsitenews.</div>
        <div className="body">
          Across the same monitored corpus, five additional accounts show convergent posting at smaller scale — <b>@btnewsroom</b> (18 topics / 22 matches) · <b>@mondoweiss</b> (17 / 35) · <b>@adamemedia</b> (14 / 18, max sim <em>0.984</em> — verbatim copies) · <b>@jacobin</b> (5 / 19) · <b>@alarabiya_eng</b> (8 / 8). The cross-network echo is the structural finding. @dropsitenews is the clearest single case because the gap between its public framing ("independent American journalism") and its observed behavior (Qatar-aligned content timed against AJ+'s publishing cadence) is the widest.
        </div>
      </div>

      <div className="meth-note">
        <b>Methodology.</b> For the top 200 @ajplus tweets by view count (Apr 2025 – Apr 2026), we queried a monitored Twitter/X corpus for @dropsitenews tweets within a ±7-day window and computed cosine similarity between tweet embeddings. Semantic similarity &gt; 0.72 counted as a match. Directional flow computed on matches ≥ 0.75. Semantic similarity alone cannot prove editorial coordination — but <b>18 distinct topics matching across two accounts with a systematic 9.8-hour lead pattern</b> is the signal this block reports. A narrower 0.80+ similarity cut produces 10 matched pairs, all of which are available on request.
      </div>
    </div>
  );
}

/* ============================================================
   AMPLIFICATION — BOT NETWORK
   ============================================================ */
const BOT_TABS = [
  { id: "agg",    label: "Aggregate",      n: 3608, pct: 32, desc: "All three AJ+ official X accounts combined. Sep–Nov 2024 telemetry." },
  { id: "en",     label: "@ajplus",        n: 1227, pct: 22, desc: "English-language account. Lowest rate in the set — still 2×+ typical baseline." },
  { id: "fr",     label: "@ajplusfrancais", n: 1562, pct: 35, desc: "French-language account. Mid-range of the three language operations." },
  { id: "ar",     label: "@ajplusarabi",   n: 819,  pct: 42, desc: "Arabic-language account. Highest rate — language most aligned with Qatar's primary domestic audience." }
];

function Amplification({ animate }) {
  const [tab, setTab] = useState("agg");
  const [revealed, setRevealed] = useState(false);
  const ref = useRef(null);
  const current = BOT_TABS.find(t => t.id === tab);

  // reveal dots on first scroll-in
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { setRevealed(true); obs.disconnect(); } });
    }, { threshold: .2 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);

  // Deterministic dot assignments per-tab (so they feel stable when switching)
  const dots = useMemo(() => {
    const total = 200;
    const target = Math.round(total * current.pct / 100);
    // Use a seeded distribution so pattern is stable per tab
    const seed = tab.charCodeAt(0) + tab.charCodeAt(tab.length - 1);
    const flags = new Set();
    let n = 0;
    while (flags.size < target && n < total * 20) {
      const i = (n * 97 + seed * 13) % total;
      flags.add(i);
      n++;
    }
    const arr = [];
    for (let i = 0; i < total; i++) arr.push(flags.has(i) ? "fake" : "real");
    return arr;
  }, [tab, current.pct]);

  return (
    <section id="amp">
      <div className="section-head">
        <div className="h-left">
          <div className="tag">§ 05 · Amplification</div>
          <h2>The engagement<br/>isn't real</h2>
        </div>
        <div className="h-right">
          A State Department-vetted cybersecurity firm analyzed <b>3,608 profiles</b> engaging AJ+'s X accounts. Nearly a third were inauthentic. The rate peaked at <b>42%</b> on the Arabic account.
        </div>
      </div>

      <div className="bot-hero" ref={ref}>
        <div className="hdr">
          <div>
            <h3>Cyabra telemetry · <span className="red">one in three</span> profiles engaging AJ+ is fake.</h3>
            <div className="sub">
              Analysis of 3,608 profiles engaging AJ+'s three language-branded X accounts (Sep–Nov 2024). Fake profiles documented as redirecting traffic to AJ+ TikTok — consistent with coordinated cross-platform amplification. Al Jazeera has not publicly responded. [7]
            </div>
          </div>
        </div>

        <div className="bot-tabs">
          {BOT_TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={tab === t.id ? "active" : ""}>
              {t.label}<span className="pct">{t.pct}%</span>
            </button>
          ))}
        </div>

        <div className="bot-grid-layout">
          <div className="bot-summary">
            <div className="big-num">{current.pct}<span className="u">%</span></div>
            <div className="big-lbl">Fake profile rate · {current.label}</div>
            <div className="big-desc">{current.desc} Sample size: <b>n = {current.n.toLocaleString()}</b>.</div>
          </div>
          <div className="bot-viz">
            <div className="lbl">
              <span>◉ 200-dot profile field · visualization</span>
              <span className="amber">{Math.round(200 * current.pct / 100)} / 200 flagged</span>
            </div>
            <div className={`dot-grid ${revealed || !animate ? "visible" : ""}`}>
              {dots.map((d, i) => (
                <div
                  key={i}
                  className={`dot ${d}`}
                  style={animate ? { transitionDelay: `${(i % 20) * 8 + Math.floor(i / 20) * 12}ms` } : {}}
                ></div>
              ))}
            </div>
            <div className="legend">
              <div className="k"><span className="sw real"></span>Authentic</div>
              <div className="k"><span className="sw fake"></span>Flagged inauthentic</div>
            </div>
          </div>
        </div>

        <div className="footer-row">
          <span>SRC · CYABRA / COMBAT ANTISEMITISM MOVEMENT · 2024-12-04 [7]</span>
          <span>CORROBORATED BY FDD [36]</span>
        </div>
      </div>

      <div className="caveat">
        <div className="hdr">Methodological caveats noted</div>
        <div className="body">
          Cyabra's detection methodology uses machine-learning classification — industry standard, but not publicly audited line-by-line. The report does <b>not</b> prove AJ+ or Qatar directly operates the bot networks; fake profiles could originate from aligned third-party actors. No Meta or YouTube enforcement actions against AJ+-linked CIB are on record, unlike documented takedowns of Russian and Iranian networks. Al Jazeera has not publicly responded.
        </div>
      </div>
    </section>
  );
}

/* ============================================================
   FARA TIMELINE
   ============================================================ */
function FARA({ animate }) {
  const [drawn, setDrawn] = useState(0);
  const ref = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          if (!animate) { setDrawn(FARA_EVENTS.length); obs.disconnect(); return; }
          let i = 0;
          const iv = setInterval(() => {
            i++; setDrawn(i);
            if (i >= FARA_EVENTS.length) clearInterval(iv);
          }, 220);
          obs.disconnect();
        }
      });
    }, { threshold: .25 });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [animate]);

  return (
    <section id="fara">
      <div className="section-head">
        <div className="h-left">
          <div className="tag">§ 07 · FARA Timeline</div>
          <h2>Six years of<br/>enforcement failure</h2>
        </div>
        <div className="h-right">
          The DOJ determined AJ+ must register under FARA in <b>September 2020</b>. Five and a half years of bipartisan congressional pressure later, AJ+ has still not registered.
        </div>
      </div>
      <div className="fara-wrap" ref={ref}>
        <div className="baseline"></div>
        <div className="fara-timeline">
          {FARA_EVENTS.map((e, i) => (
            <div key={i} className={`fara-event ${e.kind} ${i < drawn ? "drawn" : ""}`}>
              <div className="node"></div>
              <div className="date">{e.date}</div>
              <div className="label">{e.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="fara-summary">
        <div className="num">5.5<span className="u">yr</span></div>
        <div className="text">
          <b>Elapsed time</b> between DOJ's FARA determination and this report's publication date. AJ+ has continued operating, scheduling, and amplifying throughout — in open defiance of the order.
        </div>
      </div>
    </section>
  );
}

        <p>

      <div className="sources-head">Footnotes (selected)</div>
